apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: {{ .Values.env }}-{{ .Values.appName }}-httproute
  namespace: {{ .Values.namespace }}
spec:
  parentRefs:
    - name: {{ .Values.httproute.gatewayName }}
      namespace: {{ .Values.httproute.gatewayNamespace }}
      sectionName: {{ .Values.httproute.sectionName }}
  hostnames:
    - {{ .Values.httproute.hostname }}
  rules:
    - backendRefs:
        - group: ""
          kind: Service
          name: {{ .Values.env }}-{{ .Values.appName }}-svc
          port: {{ .Values.service.port }}
          weight: 1
      matches:
        - path:
            type: PathPrefix
            value: /
