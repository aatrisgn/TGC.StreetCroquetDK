name: Build and publish images

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:

permissions:
  id-token: write
  contents: read
  pull-requests: write

jobs:
  deploy_infrastructure:
    name: Deploy webapp to dev ACR
    runs-on: ubuntu-latest
    environment: dev

    defaults:
      run:
        working-directory: ./src/webapp
    
    env:
      image_name: streetcroquetdk
      acr_registry: tgclzdevacr.azurecr.io

    steps:
    - uses: actions/checkout@v3

    - name: Set up QEMU
      uses: docker/setup-qemu-action@v3

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: 'Az CLI login'
      uses: azure/login@v2
      with:
          client-id: ${{ secrets.STREETCROQUETDK_DEV_CLIENT_ID }}
          tenant-id: ${{ secrets.STREETCROQUETDK_DEV_TENANT_ID }}
          subscription-id: ${{ secrets.STREETCROQUETDK_DEV_SUBSCRIPTION_ID }}

    - name: Login to ACR
      run: az acr login --name tgclzdevacr.azurecr.io

    - name: Build and publish webapp to ACR
      run: |
        docker buildx build . \
          --platform linux/amd64,linux/arm64 \
          --tag $acr_registry/$image_name:${{ github.sha }} \
          --tag $acr_registry/$image_name:latest \
          --push